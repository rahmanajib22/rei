<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زارا خليل — صانعة محتوى</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Amiri:wght@400;700&display=swap');

:root {
  --ink: #0a0a08;
  --cream: #f5f0e8;
  --accent: #c8773a;
  --accent2: #3a6e8f;
}

body {
  margin:0;
  font-family:'Tajawal';
  background: var(--ink);
  color: var(--cream);
  overflow-x:hidden;
  cursor:none;
}

/* ✨ خلفية متحركة */
.bg-glow {
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 30%, rgba(200,119,58,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(58,110,143,0.2), transparent 40%);
  filter: blur(80px);
  animation: floatBg 20s infinite alternate ease-in-out;
}

@keyframes floatBg {
  0% { transform: translateY(-50px); }
  100% { transform: translateY(50px); }
}

/* ✨ Cursor */
#cursor {
  width:10px;height:10px;
  background:var(--accent);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
}

/* ✨ Hero */
#hero {
  height:200vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:right;
}

.hero-content {
  max-width:600px;
}

.wavy-item {
  font-size:clamp(3rem,8vw,8rem);
  font-family:'Amiri';
  opacity:0;
}

.typewriter {
  margin-top:2rem;
  color:#aaa;
  min-height:30px;
}

/* ✨ Cards 3D */
.article-card {
  background:#fff;
  color:#000;
  border-radius:16px;
  padding:2rem;
  transform-style: preserve-3d;
  transition: transform .2s;
}

.articles-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:2rem;
  padding:5rem;
}

/* ✨ زر مغناطيسي */
.btn {
  display:inline-block;
  padding:1rem 2rem;
  border:1px solid var(--accent);
  margin-top:2rem;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg-glow"></div>
<div id="cursor"></div>

<section id="hero">
  <div class="hero-content">
    <div class="wavy-item">مبدعة</div>
    <div class="wavy-item">بأسلوب مختلف</div>
    <div class="wavy-item">تروي القصة</div>

    <div class="typewriter" id="type"></div>

    <div class="btn" id="btn">اكتشف أكثر</div>
  </div>
</section>

<section class="articles-grid">
  <div class="article-card">مقال ١</div>
  <div class="article-card">مقال ٢</div>
  <div class="article-card">مقال ٣</div>
</section>

<script>

// Cursor
document.addEventListener("mousemove", e => {
  gsap.to("#cursor", {
    x: e.clientX,
    y: e.clientY,
    duration:0.1
  });
});

// Hero animation
gsap.to(".wavy-item", {
  y:0,
  opacity:1,
  stagger:0.3,
  duration:1
});

// ✍️ Typewriter
const text = "أصنع محتوى يلمس الشعور… قبل العين.";
let i = 0;

function type() {
  if(i < text.length){
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// 🌊 Parallax
gsap.to(".hero-content", {
  y: -100,
  scrollTrigger:{
    trigger:"#hero",
    start:"top top",
    scrub:1
  }
});

// 🎴 3D tilt
document.querySelectorAll(".article-card").forEach(card => {
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = (y / rect.height - 0.5) * -10;
    const rotateY = (x / rect.width - 0.5) * 10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0)";
  });
});

// 🧲 Magnetic button
const btn = document.getElementById("btn");

btn.addEventListener("mousemove", e => {
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left - rect.width/2;
  const y = e.clientY - rect.top - rect.height/2;

  gsap.to(btn, {
    x: x * 0.3,
    y: y * 0.3,
    duration:0.3
  });
});

btn.addEventListener("mouseleave", () => {
  gsap.to(btn, {x:0,y:0});
});

</script>

</body>
</html>
