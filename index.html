<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زارا خليل</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri:wght@400;700&display=swap');

body{
  margin:0;
  font-family:'Tajawal';
  background:#0a0a08;
  color:#f5f0e8;
  overflow-x:hidden;
}

/* ✨ حل مشكلة الحروف */
.typewriter {
  font-size:1.2rem;
  margin-top:20px;
  color:#aaa;
  white-space: normal;
  direction: rtl;
}

/* ✨ Hero */
#hero{
  height:200vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-content{
  max-width:600px;
  text-align:right;
}

.wavy-item{
  font-family:'Amiri';
  font-size:clamp(3rem,8vw,8rem);
  opacity:0;
}

/* 🎴 Cards */
.articles-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:2rem;
  padding:5rem;
}

.article-card{
  background:#fff;
  color:#000;
  padding:2rem;
  border-radius:16px;
  transition:0.3s;
  transform-style: preserve-3d;
}

/* ✨ Hover إضافي */
.article-card:hover{
  transform: translateY(-10px) scale(1.03);
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* 📬 Contact */
#contact{
  padding:6rem;
  background:#111;
  text-align:center;
}

input, textarea{
  width:100%;
  padding:1rem;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* 🔁 Marquee بدون فراغ */
.marquee{
  position:fixed;
  bottom:0;
  width:100%;
  background:#c8773a;
  overflow:hidden;
}

.marquee-inner{
  display:flex;
  width:max-content;
  animation:scroll 15s linear infinite;
}

.marquee-inner span{
  padding:10px 30px;
  white-space:nowrap;
  font-weight:bold;
  color:#000;
}

/* ✨ تكرار العنصر */
@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
</style>
</head>

<body>

<section id="hero">
  <div class="hero-content">
    <div class="wavy-item">مبدعة</div>
    <div class="wavy-item">وصاحبة رؤية</div>
    <div class="wavy-item">تحكي القصص</div>

    <div class="typewriter" id="type"></div>
  </div>
</section>

<section class="articles-grid">
  <div class="article-card">مشروع ١</div>
  <div class="article-card">مشروع ٢</div>
  <div class="article-card">مشروع ٣</div>
</section>

<section id="contact">
  <h2>تواصل معي</h2>
  <input placeholder="اسمك">
  <input placeholder="بريدك">
  <textarea placeholder="رسالتك"></textarea>
  <button>إرسال</button>
</section>

<div class="marquee">
  <div class="marquee-inner">
    <!-- كررنا النص مرتين لحل الفراغ -->
    <span>صناعة محتوى ✦</span>
    <span>إبداع ✦</span>
    <span>رؤية ✦</span>
    <span>صناعة محتوى ✦</span>
    <span>إبداع ✦</span>
    <span>رؤية ✦</span>
  </div>
</div>

<script>

// ✍️ Typewriter بدون تفكيك الحروف
const text = "أصنع محتوى يحرك المشاعر ويعيش في الذاكرة.";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("type").innerHTML = text.slice(0,i+1);
    i++;
    setTimeout(type,40);
  }
}
type();

// ✨ Hero animation
gsap.to(".wavy-item",{
  y:0,
  opacity:1,
  stagger:0.3,
  duration:1
});

// 🎴 حركة الكروت عند الظهور
gsap.from(".article-card",{
  scrollTrigger:{
    trigger:".articles-grid",
    start:"top 80%"
  },
  y:80,
  opacity:0,
  stagger:0.2,
  duration:1
});

// 🎴 tilt بسيط
document.querySelectorAll(".article-card").forEach(card=>{
  card.addEventListener("mousemove", e=>{
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    card.style.transform = `
      rotateX(${(y-rect.height/2)/20}deg)
      rotateY(${(x-rect.width/2)/20}deg)
      scale(1.03)
    `;
  });

  card.addEventListener("mouseleave",()=>{
    card.style.transform="rotateX(0) rotateY(0)";
  });
});

</script>

</body>
</html>
