<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بورتفوليو مسوق محتوى</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; color: white; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 2; text-align: center; pointer-events: none; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        p { font-size: 1.5rem; color: #94a3b8; }
        .btn { margin-top: 2rem; padding: 1rem 2rem; background: #38bdf8; border: none; border-radius: 30px; color: #0f172a; font-weight: bold; cursor: pointer; pointer-events: auto; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); background: #7dd3fc; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hero">
        <h1>أصنع من الكلمات.. نتائج!</h1>
        <p>مسوق محتوى متخصص في تحويل الجمهور إلى عملاء أوفياء.</p>
        <button class="btn">شاهد مشاريعي</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = '#38bdf8';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) { particlesArray.push(new Particle()); }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].size <= 0.3) {
                    particlesArray.splice(i, 1);
                    i--;
                    particlesArray.push(new Particle());
                }
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
