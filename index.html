<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زارا خليل — صانعة محتوى</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Amiri:wght@400;700&display=swap');

:root {
  --ink: #0a0a08;
  --cream: #f5f0e8;
  --accent: #c8773a;
  --muted: #8a8578;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Tajawal';
  background:var(--ink);
  color:var(--cream);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:1.5rem 3rem;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.nav-links{
  display:flex;
  gap:2rem;
  list-style:none;
}

.nav-links a{
  color:#fff;
  text-decoration:none;
  opacity:.7;
}

/* HERO */
#hero{
  min-height:200vh;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:0 8vw;
}

.wavy-item{
  font-family:'Amiri';
  font-size:clamp(3rem,8vw,9rem);
  line-height:.9;
  opacity:0;
}

#hero-sub{
  margin-top:2rem;
  color:var(--muted);
  max-width:400px;
}

/* STATS */
#stats{
  background:var(--accent);
  padding:8vh 6vw;
  display:grid;
  grid-template-columns:repeat(4,1fr);
}

.stat-num{
  font-size:3rem;
}

/* ARTICLES */
#articles{
  padding:10vh 6vw;
  background:#f5f0e8;
  color:#000;
}

.articles-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2rem;
  margin-top:2rem;
}

.article-card{
  background:#fff;
  padding:1.5rem;
  border-radius:12px;
  transition:.3s;
  transform-style:preserve-3d;
}

.article-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* CONTACT */
#contact{
  padding:10vh 6vw;
}

input,textarea{
  width:100%;
  padding:1rem;
  margin-bottom:1rem;
  background:#111;
  border:none;
  color:#fff;
}

/* MARQUEE */
.marquee-strip{
  position:fixed;
  bottom:0;
  width:100%;
  background:var(--accent);
  overflow:hidden;
}

.marquee-inner{
  display:flex;
  gap:3rem;
  width:max-content;
  animation:marqueeMove 20s linear infinite;
}

.marquee-item{
  padding:.6rem;
  color:#000;
  font-weight:bold;
}

@keyframes marqueeMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

@media(max-width:900px){
  .articles-grid{grid-template-columns:1fr;}
  #stats{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<nav>
  <div>ز.خ</div>
  <ul class="nav-links">
    <li><a href="#articles">مقالاتي</a></li>
    <li><a href="#contact">تواصل</a></li>
  </ul>
</nav>

<section id="hero">
  <div>
    <div class="wavy-item">مبدعة</div>
    <div class="wavy-item">وصاحبة رؤية</div>
    <div class="wavy-item">راوية قصص</div>

    <p id="hero-sub"></p>
  </div>
</section>

<section id="stats">
  <div><div class="stat-num">٤.٢م</div><div>متابع</div></div>
  <div><div class="stat-num">٨٠+</div><div>شراكة</div></div>
  <div><div class="stat-num">١٢</div><div>جائزة</div></div>
  <div><div class="stat-num">٣٠+</div><div>دولة</div></div>
</section>

<section id="articles">
  <h2 style="font-family:'Amiri'; font-size:3rem;">مقالات</h2>

  <div class="articles-grid">
    <div class="article-card">مقال ١</div>
    <div class="article-card">مقال ٢</div>
    <div class="article-card">مقال ٣</div>
  </div>
</section>

<section id="contact">
  <h2 style="font-family:'Amiri'; font-size:3rem;">تواصل معي</h2>

  <div style="max-width:500px;">
    <input placeholder="اسمك">
    <input placeholder="بريدك">
    <textarea placeholder="رسالتك"></textarea>
    <button style="padding:1rem 2rem; background:var(--accent); border:none;">إرسال</button>
  </div>
</section>

<div class="marquee-strip">
  <div class="marquee-inner">
    <span class="marquee-item">صناعة محتوى ✦</span>
    <span class="marquee-item">إبداع ✦</span>
    <span class="marquee-item">رؤية ✦</span>

    <!-- تكرار لمنع الفراغ -->
    <span class="marquee-item">صناعة محتوى ✦</span>
    <span class="marquee-item">إبداع ✦</span>
    <span class="marquee-item">رؤية ✦</span>
  </div>
</div>

<script>

// GSAP
gsap.registerPlugin(ScrollTrigger);

// Hero animation
gsap.to(".wavy-item",{
  y:0,
  opacity:1,
  stagger:0.3,
  duration:1
});

// Typewriter عربي صحيح
const text="أصنع محتوى يُحرّك المشاعر بنيّة صادقة وجماليات حقيقية.";
let i=0;
function type(){
  if(i<=text.length){
    document.getElementById("hero-sub").innerText=text.slice(0,i);
    i++;
    setTimeout(type,40);
  }
}
type();

// Cards animation
gsap.from(".article-card",{
  scrollTrigger:{
    trigger:"#articles",
    start:"top 80%"
  },
  y:80,
  opacity:0,
  stagger:0.2
});

// Tilt effect خفيف
document.querySelectorAll(".article-card").forEach(card=>{
  card.addEventListener("mousemove", e=>{
    const rect=card.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width-0.5;
    const y=(e.clientY-rect.top)/rect.height-0.5;

    card.style.transform=`
      rotateX(${y*-6}deg)
      rotateY(${x*6}deg)
      translateY(-10px)
    `;
  });

  card.addEventListener("mouseleave",()=>{
    card.style.transform="rotateX(0) rotateY(0)";
  });
});

</script>

</body>
</html>
